name: validate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read

on:
  push:
    branches:
      - 'main'
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Format check
        run: npm run format-check
      - name: Lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Rebuild dist
        run: npm run build
      - name: Compare dist
        id: diff
        run: |
          if [ "$(git diff --ignore-space-at-eol dist | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build. Run 'npm run build' and commit dist/." >&2
            git diff dist
            exit 1
          fi

  vendor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - name: Refresh package-lock.json
        run: npm install --package-lock-only
      - name: Compare package-lock.json
        run: |
          if [ -n "$(git status --porcelain -- package-lock.json)" ]; then
            echo "package-lock.json is out of sync with package.json. Run 'npm install' and commit." >&2
            git diff package-lock.json
            exit 1
          fi
